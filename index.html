
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — To-Do App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #d4f04a;
      --accent2: #a8e020;
      --text: #f0f0f5;
      --muted: #7a7a90;
      --danger: #ff5e6c;
      --done-bg: #1a1e14;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px 80px;
      background-image:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(212,240,74,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 10% 80%, rgba(212,240,74,0.04) 0%, transparent 70%);
    }

    .app {
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    .header {
      margin-bottom: 40px;
      animation: slideDown 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    .header-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-label::before {
      content: '';
      display: inline-block;
      width: 20px; height: 2px;
      background: var(--accent);
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.4rem, 8vw, 3.6rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--text);
    }
    h1 span { color: var(--accent); }

    .stats {
      margin-top: 14px;
      display: flex;
      gap: 20px;
    }
    .stat {
      font-size: 12px;
      color: var(--muted);
    }
    .stat b { color: var(--text); font-weight: 500; }

    /* Input area */
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      animation: slideDown 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }
    .task-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .task-input::placeholder { color: var(--muted); }
    .task-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212,240,74,0.12);
    }

    .priority-select {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .priority-select:focus { border-color: var(--accent); }

    .add-btn {
      background: var(--accent);
      color: #0e0e10;
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s;
      white-space: nowrap;
    }
    .add-btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .add-btn:active { transform: translateY(0); }

    /* Filter tabs */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      animation: slideDown 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }
    .filter-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0e0e10;
      font-weight: 500;
    }

    /* Task list */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: slideDown 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    .task-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s, background 0.2s, transform 0.2s, opacity 0.3s;
      animation: taskIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }
    .task-item:hover { border-color: #3e3e50; transform: translateX(3px); }
    .task-item.done {
      background: var(--done-bg);
      border-color: #222;
      opacity: 0.6;
    }
    .task-item.removing {
      animation: taskOut 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* Priority dot */
    .priority-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .p-high { background: #ff5e6c; box-shadow: 0 0 6px rgba(255,94,108,0.5); }
    .p-medium { background: #ffa94d; box-shadow: 0 0 6px rgba(255,169,77,0.4); }
    .p-low { background: var(--accent); box-shadow: 0 0 6px rgba(212,240,74,0.4); }

    /* Checkbox */
    .check-btn {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      color: #0e0e10;
      font-size: 13px;
    }
    .check-btn:hover { border-color: var(--accent); background: rgba(212,240,74,0.1); }
    .task-item.done .check-btn {
      background: var(--accent);
      border-color: var(--accent);
    }

    .task-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
      transition: color 0.2s;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-time {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
      line-height: 1;
    }
    .delete-btn:hover { color: var(--danger); background: rgba(255,94,108,0.1); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
    .empty p { font-size: 13px; }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 24px;
      animation: slideDown 0.6s 0.18s cubic-bezier(0.22,1,0.36,1) both;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      height: 4px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
    }

    /* Clear completed */
    .bottom-bar {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      animation: slideDown 0.6s 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }
    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.2s;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .clear-btn:hover { color: var(--danger); }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes taskIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes taskOut {
      to { opacity: 0; transform: translateX(20px) scaleY(0.8); max-height: 0; margin: 0; padding: 0; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-label">stay on track</div>
    <h1>Task<span>Flow</span></h1>
    <div class="stats">
      <div class="stat"><b id="total-count">0</b> tasks</div>
      <div class="stat"><b id="done-count">0</b> completed</div>
    </div>
  </div>

  <div class="input-area">
    <input class="task-input" id="task-input" type="text" placeholder="Add a new task..." maxlength="120"/>
    <select class="priority-select" id="priority-select">
      <option value="low">🟢 Low</option>
      <option value="medium" selected>🟠 Med</option>
      <option value="high">🔴 High</option>
    </select>
    <button class="add-btn" onclick="addTask()">+ Add</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    <button class="filter-btn" onclick="setFilter('high', this)">🔴 High</button>
  </div>

  <div class="task-list" id="task-list"></div>

  <div class="bottom-bar">
    <span id="remaining-label">No tasks yet</span>
    <button class="clear-btn" onclick="clearDone()">Clear completed</button>
  </div>

</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('taskflow') || '[]');
  let currentFilter = 'all';

  function saveTasks() {
    localStorage.setItem('taskflow', JSON.stringify(tasks));
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const priority = document.getElementById('priority-select').value;
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    tasks.unshift({ id: Date.now(), text, done: false, priority, ts: Date.now() });
    input.value = '';
    saveTasks();
    render();
    input.focus();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; saveTasks(); render(); }
  }

  function deleteTask(id) {
    const el = document.getElementById('task-' + id);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
        render();
      }, 280);
    }
  }

  function clearDone() {
    const doneTasks = tasks.filter(t => t.done);
    doneTasks.forEach(t => {
      const el = document.getElementById('task-' + t.id);
      if (el) el.classList.add('removing');
    });
    setTimeout(() => {
      tasks = tasks.filter(t => !t.done);
      saveTasks();
      render();
    }, 300);
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function getFiltered() {
    if (currentFilter === 'active') return tasks.filter(t => !t.done);
    if (currentFilter === 'done')   return tasks.filter(t => t.done);
    if (currentFilter === 'high')   return tasks.filter(t => t.priority === 'high');
    return tasks;
  }

  function render() {
    const list = document.getElementById('task-list');
    const filtered = getFiltered();
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const pct = total ? Math.round((done / total) * 100) : 0;

    document.getElementById('total-count').textContent = total;
    document.getElementById('done-count').textContent = done;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('remaining-label').textContent =
      total === 0 ? 'No tasks yet' : `${total - done} remaining`;

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">✦</div><p>${total === 0 ? 'No tasks yet — add one above!' : 'Nothing here.'}</p></div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
        <div class="priority-dot p-${t.priority}"></div>
        <button class="check-btn" onclick="toggleTask(${t.id})" title="Mark done">
          ${t.done ? '✓' : ''}
        </button>
        <span class="task-text">${escHtml(t.text)}</span>
        <span class="task-time">${formatTime(t.ts)}</span>
        <button class="delete-btn" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
